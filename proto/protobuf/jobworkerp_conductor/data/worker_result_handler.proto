syntax = "proto3";

package jobworkerp_conductor.data;

import "jobworkerp_conductor/data/jobworkerp_server.proto";
import "jobworkerp_conductor/data/common.proto";

// Worker result handler data model
// Configuration information for handlers that monitor specific worker execution results and execute subsequent workflows upon completion
message WorkerResultHandlerData {
  string name = 1;                                    // Handler name (unique identifier)
  JobworkerpServerId listen_jobworkerp_server_id = 2;  // Jobworkerp server ID to monitor
  string listen_worker_name = 3;                      // Worker name to monitor
  JobworkerpServerId process_jobworkerp_server_id = 4; // Jobworkerp server ID for processing execution
  string workflow_url = 5;                            // DEPRECATED: backward compat only (use execution_target)
  optional string channel = 6;                        // DEPRECATED: backward compat only (use execution_target)
  bool enabled = 7;                                   // Handler enabled/disabled state
  optional string description = 8;                    // Handler description text (optional)
  int64 created_at = 9;                               // Creation timestamp (Unix timestamp in seconds)
  int64 updated_at = 10;                              // Update timestamp (Unix timestamp in seconds)
  optional string args = 11;                          // Additional arguments string (optional)

  // Execution target (mutually exclusive with deprecated fields 5/6)
  oneof execution_target {
    WorkflowExecution workflow = 12;   // URL execution mode (WORKFLOW runner only)
    WorkerExecution worker = 13;       // Worker execution mode (any runner type)
  }
}

// Unique ID for worker result handler
message WorkerResultHandlerId { int64 value = 1; }

// Full data model for worker result handler entity
// Completely represents handler information through combination of ID + data
message WorkerResultHandler {
  WorkerResultHandlerId id = 1;                 // Unique ID
  WorkerResultHandlerData data = 2;             // Handler data
}
